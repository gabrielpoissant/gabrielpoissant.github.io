title: Gabe Poissant
description: Data Science Portfolio
remote_theme: "mmistakes/minimal-mistakes@4.27.3"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Enable sidebar
sidebar:
  nav: "main"

# Page default properties
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single

# Enable author profile
author_profile: true

# Define sidebar author profile 
author:
  #name   : "Gabe Poissant"
  avatar : "/assets/images/profile_800.jpg"
  bio    : "Master’s in Data Science • Analytics • Finance"

  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:gabrielpoissant@gmail.com"

    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/gabepoissant"

    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "www.linkedin.com/in/gabriel-poissant"

# Remove RSS from footer
atom_feed:
  hide: true
